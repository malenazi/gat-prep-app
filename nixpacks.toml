providers = ["python"]

# Frontend is pre-built and committed to git — no Node.js needed
[phases.build]
cmds = [
    "mkdir -p backend/static",
    "if [ -d frontend/dist ]; then cp -r frontend/dist/* backend/static/; else echo 'WARNING: frontend/dist not found'; fi"
]

[start]
cmd = "cd backend && python -m uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
