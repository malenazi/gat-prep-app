providers = ["python"]

[phases.setup]
nixPkgs = ["...", "nodejs_23"]

[phases.build]
cmds = [
    "cd frontend && npm ci && npm run build",
    "mkdir -p backend/static",
    "cp -r frontend/dist/* backend/static/"
]

[start]
cmd = "cd backend && python -m uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
