[phases.setup]
nixPkgs = ["nodejs_20", "npm-9_x", "python311"]
[phases.setup.nixOverlays]
nodejs = "nodejs_20"

[phases.install]
cmds = [
    "python -m venv /opt/venv",
    ". /opt/venv/bin/activate && pip install -r requirements.txt"
]

[phases.build]
cmds = [
    "cd frontend && npm ci && npm run build",
    "mkdir -p backend/static",
    "cp -r frontend/dist/* backend/static/"
]
dependsOn = ["install"]

[start]
cmd = "cd backend && /opt/venv/bin/python -m uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
