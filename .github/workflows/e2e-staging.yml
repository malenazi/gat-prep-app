name: Manual Staging E2E

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Frontend base URL for the deployed environment
        required: true
        type: string
      api_url:
        description: Optional API origin override, without /api
        required: false
        type: string

jobs:
  e2e-staging:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '23'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run staging new-user journey
        run: npx playwright test tests/e2e/new-user-full-journey.spec.ts
        working-directory: frontend
        env:
          E2E_BASE_URL: ${{ inputs.base_url }}
          E2E_API_URL: ${{ inputs.api_url }}
